<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>スロット設定判別テンプレート</title>
<!--
========================================================================
 スロット設定判別＆攻略ツール テンプレート v1.0
 ------------------------------------------------------------------------
 ★編集するのは <script id="machine"> 内の MACHINE オブジェクトのみ。
   その下の ENGINE / STATE / RENDER / EVENTS は共通部分（原則不変）。
 ★攻略情報は DMMぱちタウン・一撃・なな徹 の3ソースを必ず照合すること。
========================================================================
-->
<style>
:root{
  --c-primary:#00E5C8; --c-accent:#FF3D7F; --c-bg:#04070d;
  --c-text:#dbe6ee; --c-win:#5bffa0; --c-lose:#ff5a78;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{background:var(--c-bg);color:var(--c-text);font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;font-size:14px;-webkit-font-smoothing:antialiased}
button{touch-action:manipulation;font-family:inherit;cursor:pointer;border:none;outline:none;color:inherit}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
#W{max-width:520px;margin:0 auto;display:flex;flex-direction:column;height:100vh;height:100dvh;padding-top:env(safe-area-inset-top,0px)}

/* Header */
#hdr{background:rgba(6,11,18,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:11px 14px 7px;border-bottom:1px solid rgba(0,229,200,.18);flex-shrink:0}
.hr{display:flex;align-items:center;justify-content:space-between}
.ht{font-size:15px;font-weight:900;background:linear-gradient(105deg,var(--c-primary),var(--c-accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.5px}
.hs{font-size:9.5px;color:rgba(255,255,255,.32);margin-top:2px}
.hbtns{display:flex;gap:6px;align-items:center}
.hb{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:700;background:rgba(255,61,127,.08);border:1px solid rgba(255,61,127,.22);color:#ff7da6}
.hb.p{background:rgba(255,61,127,.16);border-color:rgba(255,61,127,.45);color:#ff5c93}
.hb.rst{background:rgba(255,90,120,.1);border-color:rgba(255,90,120,.28);color:#ff8da3}
.cfm{margin-top:6px;padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700}

/* Quick stats */
.qs{display:flex;gap:5px;flex-wrap:wrap;padding:6px 14px;background:rgba(5,9,15,.95);border-bottom:1px solid rgba(255,255,255,.04);font-size:10px;flex-shrink:0}
.qc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:7px;padding:4px 8px;flex:1;min-width:0;text-align:center}
.qc .l{color:rgba(255,255,255,.52);font-size:9px;display:block;margin-bottom:1px}
.qc .v{color:var(--c-primary);font-weight:700;font-size:12px;font-family:'SF Mono',ui-monospace,monospace}
.qc .v2{color:rgba(255,255,255,.45);font-size:9px}

#bd{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 90px}

/* Tabs */
#tb{display:flex;background:rgba(6,11,18,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(0,229,200,.14);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.tab{flex:1;padding:9px 2px 8px;text-align:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.34);position:relative}
.tab.on{color:var(--c-primary)}
.tab.on::before{content:"";position:absolute;top:0;left:22%;right:22%;height:2px;background:linear-gradient(90deg,var(--c-primary),var(--c-accent));border-radius:0 0 3px 3px}
.tab .ic{font-size:17px;display:block;margin-bottom:2px;line-height:1}

/* Cards */
.card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06);border-radius:13px;padding:12px;margin-bottom:10px}
.card.glow{border-color:rgba(0,229,200,.22)}
.ct{font-size:12px;font-weight:800;color:#7fe9dc;margin-bottom:9px;letter-spacing:.4px;display:flex;align-items:center;gap:6px}
.ct .tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:5px;background:rgba(0,229,200,.1);color:#5fe6d6;border:1px solid rgba(0,229,200,.2)}
.sub{font-size:10px;color:rgba(255,255,255,.52);margin:-4px 0 8px;line-height:1.55}

/* Event grid */
.eg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.egrp{margin-bottom:9px}.egrp:last-child{margin-bottom:0}
.egrp-h{display:block;font-size:10px;font-weight:700;color:rgba(127,233,220,.7);margin-bottom:5px;letter-spacing:.5px}
.eb{padding:12px 4px;border-radius:11px;background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.1);border-left:3px solid rgba(0,229,200,.55);font-size:11.5px;font-weight:700;color:rgba(255,255,255,.82);transition:transform .12s;text-align:center;line-height:1.3}
.eb:active{transform:scale(.94)}
.eb.on{background:linear-gradient(135deg,rgba(0,229,200,.28),rgba(91,200,255,.16));border-color:rgba(0,229,200,.65);color:#d6fff8}
.eb .es{display:block;font-size:9px;color:rgba(255,255,255,.42);font-weight:600;margin-top:2px}
.eb.on .es{color:rgba(214,255,248,.72)}

/* Segmented */
.seg{display:flex;gap:5px;flex-wrap:wrap}
.so{flex:1;min-width:60px;padding:10px 4px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);font-size:11px;font-weight:700;color:rgba(255,255,255,.72);text-align:center;transition:transform .12s}
.so:active{transform:scale(.95)}
.so.on{background:rgba(0,229,200,.22);border-color:rgba(0,229,200,.6);color:#d6fff8}
.so.win.on{background:rgba(91,255,160,.2);border-color:rgba(91,255,160,.55);color:#c8ffd9}
.so.lose.on{background:rgba(255,90,120,.18);border-color:rgba(255,90,120,.5);color:#ffc2ce}

/* Fields */
.fld{margin-top:10px}
.fl{font-size:11px;color:rgba(255,255,255,.64);margin-bottom:5px;font-weight:600}
.gi input,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:11px 13px;color:#eaf6f3;font-size:16px;font-weight:700;font-family:'SF Mono',ui-monospace,monospace;outline:none}
textarea{font-size:13px;font-family:inherit;font-weight:400;resize:none}
.gi input:focus,textarea:focus{border-color:rgba(0,229,200,.5)}

.addb{width:100%;margin-top:12px;padding:14px;border-radius:12px;background:linear-gradient(135deg,#00B89E,#0090C8);color:#02110e;font-size:14px;font-weight:900;letter-spacing:1px}
.addb:active{transform:scale(.98);opacity:.92}
.addb:disabled{opacity:.3}

/* Counter rows */
.crow{display:flex;align-items:center;gap:8px;padding:9px 8px;border-bottom:1px solid rgba(255,255,255,.05)}
.crow.active{background:rgba(0,229,200,.07);border-left:3px solid rgba(0,229,200,.5)}
.crow:last-child{border-bottom:none}
.cinfo{flex:1;min-width:0}.cnm{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.82)}
.cbadge{display:inline-block;font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;margin-top:2px;background:rgba(0,229,200,.14);color:#5fe6d6}
.cw{display:flex;align-items:center;gap:5px}
.cmin,.cplus{width:36px;height:36px;border-radius:9px;font-size:19px;font-weight:700;display:flex;align-items:center;justify-content:center}
.cmin{background:rgba(255,90,120,.09);border:1px solid rgba(255,90,120,.16);color:#ff8da3}
.cplus{background:rgba(0,229,200,.08);border:1px solid rgba(0,229,200,.16);color:#7fe9dc}
.cmin:active,.cplus:active{transform:scale(.86)}
.cval{min-width:34px;height:36px;border-radius:9px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;font-family:'SF Mono',ui-monospace,monospace;padding:0 5px}

/* Tables / bars */
.itbl{width:100%;border-collapse:collapse;margin:6px 0;font-size:11px}
.itbl th{background:rgba(0,229,200,.08);color:#7fe9dc;padding:5px 6px;text-align:center;font-weight:700;border:1px solid rgba(255,255,255,.06)}
.itbl td{padding:5px 6px;text-align:center;color:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.05)}
.itbl td.h{color:#FFD66B;font-weight:700}
.itbl td.k{color:rgba(255,255,255,.78);font-weight:600;text-align:left}
.sbar{display:flex;align-items:center;gap:7px;margin-top:5px}
.sbar .sl{width:30px;font-size:10px;color:rgba(255,255,255,.45);font-weight:700}
.sbar .st{flex:1;height:13px;background:rgba(255,255,255,.05);border-radius:7px;overflow:hidden}
.sbar .sf{height:100%;border-radius:7px;background:linear-gradient(90deg,#0090C8,var(--c-primary))}
.sbar .sv{width:48px;font-size:10px;color:rgba(255,255,255,.6);font-weight:700;text-align:right;font-family:'SF Mono',ui-monospace,monospace}
.sbar.best .sf{background:linear-gradient(90deg,#FF8A00,#FFD66B)}
.sbar.best .sv{color:#FFD66B}
.calc-sub{color:rgba(255,255,255,.3);margin-top:3px;font-size:9.5px;line-height:1.5}

.ib{margin-bottom:9px;padding:10px 12px;border-radius:11px;background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.06)}
.ib p{font-size:11.5px;color:rgba(255,255,255,.62);line-height:1.65;margin:3px 0}
.ib .em{color:#FFD66B;font-weight:700}

/* Timeline */
.tl-empty{text-align:center;color:rgba(255,255,255,.25);padding:40px 0;font-size:12px}
.tli{display:flex;gap:9px;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.tli-i{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:rgba(255,255,255,.05)}
.tli-b{flex:1;min-width:0}.tli-t{font-size:12px;font-weight:700;color:rgba(255,255,255,.82)}
.tli-s{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px;line-height:1.45}
.tli-x{color:rgba(255,90,120,.5);font-size:18px;padding:0 4px;align-self:center}
.tli-g{font-size:11px;color:#7fe9dc;font-weight:700;font-family:'SF Mono',ui-monospace,monospace;align-self:center}

.exp-ta{width:100%;min-height:280px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;color:#9fd8d0;font-size:11px;font-family:'SF Mono',ui-monospace,monospace;white-space:pre-wrap;resize:none;outline:none;-webkit-user-select:all;user-select:all}
.btn2{display:flex;gap:8px;margin-top:10px}
.btn2 button{flex:1;padding:12px;border-radius:11px;font-size:12px;font-weight:700}
.bcopy{background:rgba(0,229,200,.12);border:1px solid rgba(0,229,200,.3);color:#7fe9dc}
.note{font-size:9.5px;color:rgba(255,255,255,.28);text-align:center;margin-top:14px;line-height:1.6}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:999;display:flex;align-items:center;justify-content:center;padding:24px}
.modal-card{background:#12121c;border:1px solid rgba(255,90,120,.3);border-radius:16px;padding:22px 20px;max-width:340px;width:100%}
.modal-t{font-size:16px;font-weight:900;color:#ff8da3;margin-bottom:8px}
.modal-m{font-size:12px;color:rgba(255,255,255,.7);line-height:1.6;margin-bottom:18px}
.modal-btns{display:flex;gap:10px}
.modal-cancel,.modal-ok{flex:1;padding:13px;border-radius:11px;font-size:13px;font-weight:800}
.modal-cancel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);color:rgba(255,255,255,.85)}
.modal-ok{background:linear-gradient(135deg,#ff5a78,#ff3d6e);color:#fff}
</style>
</head>
<body>
<div id="W">
<div id="hdr">
<div class="hr">
<div><div class="ht" id="hTitle"></div><div class="hs" id="hSub"></div></div>
<div class="hbtns">
<button class="hb" id="setBtn">示唆 −</button>
<button class="hb rst" data-a="reset">リセット</button>
</div>
</div>
<div id="confirmMsg"></div>
</div>
<div class="qs" id="qs"></div>
<div id="bd"></div>
<div id="tb"></div>
</div>
<div id="resetModal" class="modal-bg" style="display:none">
<div class="modal-card">
<div class="modal-t">全データをリセット</div>
<div class="modal-m">記録・カウンター・履歴をすべて削除します。この操作は取り消せません。</div>
<div class="modal-btns">
<button class="modal-cancel" data-a="reset-cancel">キャンセル</button>
<button class="modal-ok" data-a="reset-confirm">削除する</button>
</div>
</div>
</div>

<!-- ====================================================================
     ★★★ ここだけ機種ごとに編集する（MACHINE オブジェクト） ★★★
     下記はサンプル（攻殻機動隊を簡略化したデモデータ）。
     ==================================================================== -->
<script id="machine">
var MACHINE = {
  id: "tokyoghoul",
  title: "東京喰種 SETTING NAVI",
  subtitle: "スマスロ 東京喰種 設定判別 ＆ 実戦ナビ",
  theme: { primary:"#C8102E", accent:"#7B2FBE", bg:"#08050a" },

  rates: {
    cz:   { label:"CZ",        denom:[262.6,255.6,246.5,233.1,216.4,203.7] },
    at:   { label:"AT初当り",   denom:[394.4,380.5,357.0,325.9,291.2,261.3] },
    ep:   { label:"エピソードBONUS",denom:[6620.2,5879.7,5114.5,4062.5,3166.7,2639.5] },

  },
  kw: [97.5,99.0,101.6,105.6,110.3,114.9],

  pcts: {
    g100:    { label:"100G以内CZ当選率", values:[19.6,21.0,23.2,26.4,32.0,36.0] },
    modori:  { label:"AT引き戻し率",     values:[7.81,7.81,9.38,10.94,12.50,15.23] },
    uraat:   { label:"初回裏AT選択率",   values:[1.10,1.32,1.63,2.19,2.85,3.32] },
    seishin: { label:"精神世界 保証33G選択率", values:[3.1,3.1,6.3,9.4,10.9,12.5] }
  },

  events: [
    { key:"cz", name:"CZ", sub:"レミニセンス/利世", group:"通常時", icon:"🩸",
      fields:[
        { type:"choice", key:"cztype", label:"CZ種別（利世は特大設定差・メニューで回数確認）",
          options:[
            {v:"remini", l:"レミニセンス", denom:true},
            {v:"rize",   l:"大喰いの利世", denom:true},
            {v:"kakutei",l:"確定/直撃CZ", denom:false}
          ]},
        { type:"choice", key:"trig", label:"当選G数（100G以内カウント）",
          options:[
            {v:"in100",  l:"100G以内", denom:true},
            {v:"over100",l:"101G以降", denom:true}
          ]},
        { type:"result", key:"res", label:"成否",
          options:[{v:"s",l:"成功",cls:"win"},{v:"f",l:"失敗",cls:"lose"}] },
        { type:"screen", key:"czcard", label:"CZ終了画面カード（失敗時PUSH）", showIf:{res:"f"},
          options:[
            {v:"def",     l:"通常/モード示唆"},

            {v:"fukurou", l:"梟",confirm:4},
            {v:"arima",   l:"有馬貴将",confirm:6}
          ]},
        { type:"note" }
      ],
      stat:{ countsAs:"cz", denomField:"cztype", failField:"res", failValue:"f" }
    },
    { key:"ep", name:"エピソードBONUS", sub:"AT直行(特大設定差)", group:"通常時", icon:"📖",
      fields:[ {type:"note"} ],
      stat:{ countsAs:"ep" }
    },
    { key:"choku", name:"AT直撃", sub:"リプレイ直撃(EP除く)", group:"通常時", icon:"⚡",
      fields:[ {type:"note"} ],
      stat:{ countsAs:"choku" }
    },
    { key:"seishin", name:"精神世界", sub:"超高確 保証G数", group:"通常時", icon:"🌀",
      fields:[
        { type:"choice", key:"hosho", label:"表示G数（保証33Gに設定差）",
          options:[
            {v:"g10",l:"10G(保証13G)"},
            {v:"g20",l:"20G(保証23G)"},
            {v:"g30",l:"30G(保証33G)"}
          ]},
        { type:"result", key:"res", label:"CZ当選した？",
          options:[{v:"s",l:"当選",cls:"win"},{v:"f",l:"非当選",cls:"lose"}] },
        { type:"note" }
      ],
      stat:{ countsAs:"seishin_hit" }
    },
    { key:"zenchou", name:"前兆(東京上空)", sub:"本前兆期待度示唆", group:"通常時", icon:"🌆",
      fields:[
        { type:"choice", key:"effect", label:"東京上空エフェクト色",
          options:[
            {v:"normal",l:"通常"},
            {v:"red",   l:"赤(期待度大幅UP)"}
          ]},
        { type:"choice", key:"g50", label:"50G移行？(天国濃厚)",
          options:[
            {v:"y",l:"50Gで移行"},
            {v:"n",l:"それ以外"}
          ]},
        { type:"result", key:"res", label:"CZ以上当選した？",
          options:[{v:"s",l:"当選",cls:"win"},{v:"f",l:"ハズレ",cls:"lose"}] },
        { type:"note" }
      ]
    },
    { key:"kakugan", name:"赫眼リプレイ", sub:"下段リプレイ(通常/AT問わず・設定差小)", group:"その他", icon:"🔴",
      fields:[ {type:"note"} ],
      stat:{ countsAs:"kakugan" }
    },
    { key:"freeze", name:"ロングフリーズ", sub:"確定チェリーの約1/6", group:"通常時", icon:"❄️",
      fields:[ {type:"number",key:"mai",label:"初期枚数(約2000枚)"}, {type:"note"} ]
    },
    { key:"kakuche", name:"確定チェリー", sub:"中段チェリー", group:"通常時", icon:"🍒",
      fields:[ {type:"note"} ]
    },
    { key:"at", name:"AT初当り", sub:"東京喰種咬", group:"AT・上位", icon:"🎰",
      fields:[
        { type:"choice", key:"keiyu", label:"突入契機",
          options:[
            {v:"cz", l:"CZ経由"},
            {v:"ep", l:"EP経由"},
            {v:"choku",l:"直撃"}
          ]},
        { type:"choice", key:"ura", label:"裏ATスタート？(ネガポジ濃厚)",
          options:[
            {v:"omote",l:"通常"},
            {v:"ura",  l:"裏AT"}
          ]},
        { type:"number", key:"mai", label:"獲得枚数（任意）" },
        { type:"screen", key:"endscr", label:"AT終了画面", showIf:{},
          options:[
            {v:"def",   l:"デフォルト"},
            {v:"odd",   l:"亜門+真戸(奇数)"},
            {v:"even",  l:"什造+篠原(偶数)"},
            {v:"rize",  l:"神代利世(設1否定)"},
            {v:"hi_w",  l:"笛口姉妹(高設定弱)"},
            {v:"hi_s",  l:"ウタ等(高設定強)"},
            {v:"kin",   l:"金木+董香(金)",confirm:4},
            {v:"niji",  l:"あんてぃく集合(虹)",confirm:6}
          ]},
        { type:"screen", key:"trophy", label:"ナミちゃんトロフィー",
          options:[
            {v:"none", l:"なし"},
            {v:"kuro", l:"黒(継続示唆)"},
            {v:"kin",  l:"金",confirm:4},
            {v:"shu",  l:"喰種",confirm:5},
            {v:"niji", l:"虹",confirm:6}
          ]},
        { type:"screen", key:"mai_ovr", label:"獲得枚数表示の示唆", showIf:{},
          options:[
            {v:"none",l:"なし"},
            {v:"456", l:"456OVER",confirm:4},
            {v:"666", l:"666OVER",confirm:6},
            {v:"1000",l:"1000-7OVER",confirm:6}
          ]},
        { type:"note" }
      ],
      stat:{ countsAs:"at" }
    },
    { key:"battle", name:"喰種対決", sub:"AT中バトルCZ", group:"AT・上位", icon:"👊",
      fields:[
        { type:"choice", key:"enemy", label:"対戦相手(期待度)",
          options:[

<!-- ====================================================================
     共通エンジン（原則不変）
     ==================================================================== -->
<script>
'use strict';
var M = MACHINE;
var SK = M.id;
var CC={}, LOG=[], cur={}, curTab='rec';

/* utils */
function $(s){return document.querySelector(s);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function clamp(n,a,b){return Math.max(a,Math.min(b,n));}
function cc(k){return CC[k]||0;}

function save(){try{localStorage.setItem(SK+'c',JSON.stringify(CC));localStorage.setItem(SK+'l',JSON.stringify(LOG));}catch(e){}}
function load(){try{CC=JSON.parse(localStorage.getItem(SK+'c')||'{}')||{};LOG=JSON.parse(localStorage.getItem(SK+'l')||'[]')||[];}catch(e){CC={};LOG=[];}}
function inc(k,d){CC[k]=Math.max(0,(CC[k]||0)+d);save();render();}
function incSilent(k,d){CC[k]=Math.max(0,(CC[k]||0)+d);}

/* 推定エンジン */
function rateGuess(hits,total,denom){
  if(!total||!hits)return null;
  var actual=total/hits,best=-1,bd=1e9;
  for(var s=0;s<6;s++){var d=Math.abs(denom[s]-actual);if(d<bd){bd=d;best=s+1;}}
  return {actual:actual,best:best};
}
function pctGuess(hit,total,pcts){
  if(!total)return null;
  var actual=hit/total*100,best=-1,bd=1e9;
  for(var s=0;s<6;s++){var d=Math.abs(pcts[s]-actual);if(d<bd){bd=d;best=s+1;}}
  return {actual:actual,best:best};
}

/* イベント定義の検索 */
function evDef(k){for(var i=0;i<M.events.length;i++)if(M.events[i].key===k)return M.events[i];return null;}

/* 総G数（AT/BN中Gを除外する区間最大値方式） */
function totalG(){
  var total=0;
  for(var i=0;i<LOG.length;i++){var g=parseInt(LOG[i].g,10);if(!isNaN(g)&&g>0)total+=g;}
  return total;
}

/* 統計集計（events[].stat 宣言を解釈） */
function stats(){
  var out={ totG:totalG() };
  // 各 countsAs ごとに hit/denom を集計
  var bucket={};
  function B(k){if(!bucket[k])bucket[k]={hit:0,denom:0,fail:0};return bucket[k];}
  for(var i=0;i<LOG.length;i++){
    var e=LOG[i],def=evDef(e.ev);
    if(!def||!def.stat)continue;
    var st=def.stat, ca=st.countsAs;
    if(!ca)continue;
    var b=B(ca);
    // 母数算入の判定
    var inDenom=true;
    if(st.denomField){
      var fv=e[st.denomField];
      var fld=null;
      for(var f=0;f<def.fields.length;f++)if(def.fields[f].key===st.denomField)fld=def.fields[f];
      if(fld&&fld.options){
        for(var o=0;o<fld.options.length;o++)if(fld.options[o].v===fv&&fld.options[o].denom===false)inDenom=false;
      }
    }
    if(inDenom){b.denom++; b.hit++;}
    // 失敗カウント
    if(st.failField&&e[st.failField]===st.failValue)b.fail++;
  }
  out.bucket=bucket;
  return out;
}

/* 確定判定：counters[].confirm ＋ screenフィールドのconfirm */
function confirmedMin(){
  var min=1, reasons=[];
  function bump(v,why){if(v>min)min=v;if(v>=2)reasons.push(why+'→設'+v+(v===6?'':'以上')+'濃厚');}
  (M.counters||[]).forEach(function(c){ if(c.key&&c.confirm&&cc(c.key))bump(c.confirm,c.name); });
  // 記録された画面のconfirm
  for(var i=0;i<LOG.length;i++){
    var e=LOG[i],def=evDef(e.ev);if(!def)continue;
    (def.fields||[]).forEach(function(fld){
      if(fld.type==='screen'&&e[fld.key]){
        (fld.options||[]).forEach(function(o){if(o.v===e[fld.key]&&o.confirm)bump(o.confirm,def.name+'「'+o.l+'」');});
      }
    });
  }
  return {min:min,reasons:reasons};
}
</script>

<!-- ====================================================================
     共通レンダリング（原則不変）
     ==================================================================== -->
<script>
var TABS=[
  {k:'rec',ic:'✍️',l:'記録'},
  {k:'cnt',ic:'🔢',l:'カウンター'},
  {k:'nav',ic:'🧭',l:'攻略'},
  {k:'log',ic:'📜',l:'履歴'},
  {k:'info',ic:'💡',l:'示唆'},
  {k:'exp',ic:'📤',l:'出力'}
];

function applyTheme(){
  var r=document.documentElement.style;
  if(M.theme){ if(M.theme.primary)r.setProperty('--c-primary',M.theme.primary);
    if(M.theme.accent)r.setProperty('--c-accent',M.theme.accent);
    if(M.theme.bg)r.setProperty('--c-bg',M.theme.bg); }
  $('#hTitle').textContent=M.title||'';
  $('#hSub').textContent=M.subtitle||'';
}

function render(){
  rHdr(); rQS();
  var bd=$('#bd');
  if(curTab==='rec')bd.innerHTML=rRec();
  else if(curTab==='cnt')bd.innerHTML=rCnt();
  else if(curTab==='nav')bd.innerHTML=rNav();
  else if(curTab==='log')bd.innerHTML=rLog();
  else if(curTab==='info')bd.innerHTML=rInfo();
  else if(curTab==='exp')bd.innerHTML=rExp();
  rTabs();
}

function rTabs(){
  var h='';
  TABS.forEach(function(t){h+='<div class="tab'+(t.k===curTab?' on':'')+'" data-tab="'+t.k+'"><span class="ic">'+t.ic+'</span>'+t.l+'</div>';});
  $('#tb').innerHTML=h;
}

function rHdr(){
  var cf=confirmedMin(),b=$('#setBtn'),m=$('#confirmMsg');
  if(cf.min>1){
    b.className='hb p';b.textContent='設'+cf.min+(cf.min===6?' 確定':'以上');
    m.className='cfm';m.style.background='rgba(255,61,127,.1)';m.style.border='1px solid rgba(255,61,127,.3)';m.style.color='#ff9bbd';
    m.innerHTML='🔓 '+esc(cf.reasons.join(' / '));
  }else{ b.className='hb';b.textContent='示唆 −';m.className='';m.innerHTML=''; }
}

function rQS(){
  var st=stats(),html='';
  html+='<div class="qc"><span class="l">総G数</span><span class="v">'+(st.totG||0)+'</span></div>';
  // rates の各項目をクイック表示
  for(var key in M.rates){
    var r=M.rates[key],b=st.bucket[key]||{hit:0},g=rateGuess(b.hit,st.totG,r.denom);
    html+='<div class="qc"><span class="l">'+esc(r.label)+' '+(b.hit||0)+'回</span><span class="v">'+(b.hit&&st.totG?('1/'+Math.round(st.totG/b.hit)):'—')+'</span>'+(g?'<span class="v2">≒設'+g.best+'</span>':'')+'</div>';
  }
  $('#qs').innerHTML=html;
}

/* ---- 記録タブ ---- */
function rRec(){
  var h='<div class="card glow"><div class="ct">イベント記録 <span class="tag">G数→項目→記録</span></div>';
  h+='<div class="fld"><div class="fl">消化G数</div><div class="gi"><input id="iG" type="number" inputmode="numeric" placeholder="G数を入力" value="'+esc(cur.g||'')+'"></div></div>';

  if(!cur.ev){
    var groups={};
    M.events.forEach(function(e){(groups[e.group||'その他']=groups[e.group||'その他']||[]).push(e);});
    h+='<div class="fld"><div class="fl">イベント</div>';
    for(var gn in groups){
      h+='<div class="egrp"><span class="egrp-h">'+esc(gn)+'</span><div class="eg">';
      groups[gn].forEach(function(e){
        h+='<button class="eb" data-ev="'+e.key+'">'+esc(e.name)+'<span class="es">'+esc(e.sub||'')+'</span></button>';
      });
      h+='</div></div>';
    }
    h+='</div>';
  }else{
    var def=evDef(cur.ev);
    h+='<div class="fld"><div class="fl">イベント</div><div class="eg" style="grid-template-columns:1fr auto">';
    h+='<button class="eb on" data-ev="'+cur.ev+'">'+esc(def.name)+'<span class="es">'+esc(def.sub||'')+'</span></button>';
    h+='<button class="eb" data-a="evchange" style="min-width:84px">🔄 変更</button></div></div>';
    // フィールド生成
    (def.fields||[]).forEach(function(fld){ h+=renderField(fld); });
  }

  h+='<button class="addb" data-a="add"'+(cur.ev?'':' disabled')+'>'+(cur.ev?'記録する':'イベントを選択')+'</button></div>';

  if(LOG.length){
    h+='<div class="card"><div class="ct">直近の記録 <span class="tag">×で削除</span></div>';
    for(var i=LOG.length-1;i>=Math.max(0,LOG.length-4);i--)h+=tlItem(LOG[i],i,false);
    h+='</div>';
  }
  return h;
}

function renderField(fld){
  // showIf 条件
  if(fld.showIf){ for(var k in fld.showIf){ if(cur[k]!==fld.showIf[k])return ''; } }
  if(fld.type==='note'){
    return '<div class="fld"><div class="fl">メモ（任意）</div><textarea id="iNote" rows="2" placeholder="所感など">'+esc(cur.note||'')+'</textarea></div>';
  }
  if(fld.type==='number'){
    return '<div class="fld"><div class="fl">'+esc(fld.label||'')+'</div><div class="gi"><input data-num="'+fld.key+'" type="number" inputmode="numeric" value="'+esc(cur[fld.key]||'')+'"></div></div>';
  }
  if(fld.type==='choice'||fld.type==='result'){
    var h='<div class="fld"><div class="fl">'+esc(fld.label||'')+'</div><div class="seg">';
    (fld.options||[]).forEach(function(o){
      var on=cur[fld.key]===o.v;
      h+='<button class="so'+(o.cls?' '+o.cls:'')+(on?' on':'')+'" data-seg="'+fld.key+'" data-val="'+o.v+'">'+esc(o.l)+'</button>';
    });
    h+='</div></div>';return h;
  }
  if(fld.type==='screen'){
    var h2='<div class="fld"><div class="fl">'+esc(fld.label||'')+'</div><div class="eg">';
    (fld.options||[]).forEach(function(o){
      var on=cur[fld.key]===o.v;
      h2+='<button class="eb'+(on?' on':'')+'" data-seg="'+fld.key+'" data-val="'+o.v+'">'+esc(o.l)+(o.confirm?'<span class="es">設'+o.confirm+(o.confirm===6?'':'↑')+'</span>':'')+'</button>';
    });
    h2+='</div></div>';return h2;
  }
  return '';
}

/* ---- カウンタータブ ---- */
function rCnt(){
  var st=stats(),h='';
  // 自動集計：基本確率
  h+='<div class="card glow"><div class="ct">📊 基本確率 <span class="tag">自動集計</span></div>';
  h+='<table class="itbl"><tr><th>項目</th><th>回数</th><th>確率</th><th>≒設定</th></tr>';
  h+='<tr><td class="k">総G数</td><td colspan="3">'+(st.totG||0)+' G</td></tr>';
  for(var key in M.rates){
    var r=M.rates[key],b=st.bucket[key]||{hit:0},g=rateGuess(b.hit,st.totG,r.denom);
    h+='<tr><td class="k">'+esc(r.label)+'</td><td>'+(b.hit||0)+'</td><td class="h">'+(b.hit&&st.totG?('1/'+Math.round(st.totG/b.hit)):'—')+'</td><td>'+(g?'設'+g.best:'—')+'</td></tr>';
  }
  h+='</table>';
  if(!st.totG)h+='<div class="sub">記録タブでG数とイベントを記録すると確率が出ます。</div>';
  h+='</div>';

  // %系の推定（pctsの各項目について _hit バケットがあれば）
  var pctHtml='';
  for(var pk in M.pcts){
    var p=M.pcts[pk],b2=st.bucket[pk+'_hit'];
    if(b2&&b2.hit){
      // 分母は同名rate or 別途。ここでは hit のみ表示
      pctHtml+=estBar(p.label,b2.hit,b2.hit,p.values);
    }
  }
  if(pctHtml)h+='<div class="card glow"><div class="ct">🎯 当選率の設定推定</div>'+pctHtml+'</div>';

  // 手動カウンター
  h+='<div class="sub" style="margin:10px 0 6px">▼ 手動で計上する設定示唆（出たら+1）</div>';
  var open=false;
  (M.counters||[]).forEach(function(d){
    if(d.group){ if(open)h+='</div>'; h+='<div class="card"><div class="ct">'+esc(d.group)+'</div>';open=true;return; }
    var n=cc(d.key),act=n>0;
    h+='<div class="crow'+(act?' active':'')+'"><div class="cinfo"><div class="cnm">'+esc(d.name)+'</div>';
    if(d.badge)h+='<span class="cbadge">'+esc(d.badge)+'</span>';
    h+='</div><div class="cw"><button class="cmin" data-cm="'+d.key+'">−</button><div class="cval">'+n+'</div><button class="cplus" data-cp="'+d.key+'">＋</button></div></div>';
  });
  if(open)h+='</div>';
  return h;
}
function estBar(name,hit,total,pcts){
  var g=pctGuess(hit,total,pcts);
  var h='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px"><span style="color:rgba(255,255,255,.7);font-weight:700">'+esc(name)+'</span><span style="color:#7fe9dc;font-family:monospace">'+(total?(hit+'/'+total+' = '+(hit/total*100).toFixed(1)+'%'):'—')+'</span></div>';
  for(var s=0;s<6;s++){
    var pct=pcts[s],w=clamp(pct/(pcts[5]*1.15)*100,3,100),best=g&&g.best===s+1;
    h+='<div class="sbar'+(best?' best':'')+'"><span class="sl">設'+(s+1)+'</span><span class="st"><span class="sf" style="width:'+w+'%"></span></span><span class="sv">'+pct.toFixed(1)+'%</span></div>';
  }
  h+='</div>';return h;
}

/* ---- 攻略タブ ---- */
function rNav(){
  if(!M.guide||!M.guide.length)return '<div class="tl-empty">攻略情報は未登録です。</div>';
  var h='';
  M.guide.forEach(function(g){h+='<div class="card"><div class="ct">'+esc(g.title)+'</div>'+(g.html||'')+'</div>';});
  return h;
}

/* ---- 履歴タブ ---- */
function tlItem(e,i,mini){
  var def=evDef(e.ev),icon=def?def.icon||'•':'•',name=def?def.name:e.ev;
  var sub=[];
  if(def)(def.fields||[]).forEach(function(fld){
    var v=e[fld.key];if(v==null||v==='')return;
    if(fld.type==='note'){sub.push(esc(v));return;}
    if(fld.options){for(var o=0;o<fld.options.length;o++)if(fld.options[o].v===v){sub.push(esc(fld.options[o].l));return;}}
    sub.push(esc(v));
  });
  var h='<div class="tli"><div class="tli-i">'+icon+'</div><div class="tli-b"><div class="tli-t">'+esc(name)+'</div>';
  if(sub.length)h+='<div class="tli-s">'+sub.join('・')+'</div>';
  h+='</div>';
  if(typeof e.g==='number'&&e.g>0)h+='<div class="tli-g">'+e.g+'G</div>';
  if(!mini)h+='<button class="tli-x" data-del="'+i+'">×</button>';
  h+='</div>';return h;
}
function rLog(){
  if(!LOG.length)return '<div class="tl-empty">記録がありません。<br>「記録」タブからイベントを追加してください。</div>';
  var h='<div class="card"><div class="ct">履歴 <span class="tag">'+LOG.length+'件</span></div>';
  for(var i=LOG.length-1;i>=0;i--)h+=tlItem(LOG[i],i,false);
  h+='</div>';return h;
}

/* ---- 示唆タブ ---- */
function rInfo(){
  var h='';
  // 設定差データ表
  h+='<div class="card glow"><div class="ct">📊 設定差のある抽選値</div><table class="itbl"><tr><th>設定</th>';
  var rkeys=[];for(var k in M.rates){rkeys.push(k);h+='<th>'+esc(M.rates[k].label)+'</th>';}
  if(M.kw)h+='<th>機械割</th>';
  h+='</tr>';
  for(var s=0;s<6;s++){
    h+='<tr><td class="k">設'+(s+1)+'</td>';
    rkeys.forEach(function(k){h+='<td>1/'+M.rates[k].denom[s].toFixed(1)+'</td>';});
    if(M.kw)h+='<td>'+M.kw[s].toFixed(1)+'%</td>';
    h+='</tr>';
  }
  h+='</table></div>';

  // %系
  if(M.pcts){
    h+='<div class="card"><div class="ct">🎯 主な判別要素（％）</div>';
    for(var pk in M.pcts){
      var p=M.pcts[pk];
      h+='<div style="font-size:11.5px;font-weight:700;color:#9fe9dd;margin:6px 0 4px">'+esc(p.label)+'</div><table class="itbl"><tr>';
      for(var s2=0;s2<6;s2++)h+='<th>設'+(s2+1)+'</th>';h+='</tr><tr>';
      for(var s3=0;s3<6;s3++)h+='<td class="'+(s3>=3?'h':'')+'">'+p.values[s3].toFixed(1)+'%</td>';
      h+='</tr></table>';
    }
    h+='</div>';
  }

  // info カタログ
  (M.info||[]).forEach(function(sec){
    h+='<div class="card"><div class="ct">'+esc(sec.title)+'</div><table class="itbl"><tr><th>項目</th><th>示唆</th></tr>';
    sec.rows.forEach(function(r){h+='<tr><td class="k">'+esc(r[0])+'</td><td class="'+(r[2]?'h':'')+'">'+esc(r[1])+'</td></tr>';});
    h+='</table></div>';
  });

  if(M.source)h+='<div class="note">'+esc(M.source)+'</div>';
  return h;
}

/* ---- 出力タブ ---- */
function rExp(){
  var st=stats(),cf=confirmedMin(),lines=[];
  lines.push('=== '+M.title+' 実戦データ ===');
  lines.push('総G数: '+(st.totG||0));
  for(var key in M.rates){
    var b=st.bucket[key]||{hit:0};
    lines.push(M.rates[key].label+': '+(b.hit||0)+'回'+(b.hit&&st.totG?(' (1/'+Math.round(st.totG/b.hit)+')'):''));
  }
  if(cf.reasons.length){lines.push('');lines.push('【設定示唆】');cf.reasons.forEach(function(r){lines.push('・'+r);});}
  lines.push('');lines.push('--- 履歴('+LOG.length+'件) ---');
  for(var i=0;i<LOG.length;i++){
    var e=LOG[i],def=evDef(e.ev),parts=[def?def.name:e.ev];
    if(typeof e.g==='number'&&e.g>0)parts.push(e.g+'G');
    if(def)(def.fields||[]).forEach(function(fld){
      var v=e[fld.key];if(v==null||v==='')return;
      if(fld.options){for(var o=0;o<fld.options.length;o++)if(fld.options[o].v===v){parts.push(fld.options[o].l);return;}}
      parts.push(v);
    });
    lines.push((i+1)+'. '+parts.join(' / '));
  }
  var txt=lines.join('\n');
  var h='<div class="card"><div class="ct">📤 データ出力</div><div class="sub">長押しで全選択できます。</div>';
  h+='<textarea class="exp-ta" id="expTa" readonly>'+esc(txt)+'</textarea>';
  h+='<div class="btn2"><button class="bcopy" data-a="copy">📋 コピー</button></div></div>';
  if(M.source)h+='<div class="note">データはこの端末のブラウザ内にのみ保存されます。</div>';
  return h;
}
</script>

<!-- ====================================================================
     共通イベント処理（原則不変）
     ==================================================================== -->
<script>
function blankCur(){return {ev:'',g:cur.g||'',note:''};}

function addEntry(){
  if(!cur.ev)return;
  var def=evDef(cur.ev),e={ev:cur.ev};
  var g=parseInt(cur.g,10);if(!isNaN(g)&&g>0)e.g=g;
  (def.fields||[]).forEach(function(fld){
    // showIf を満たさないフィールドは保存しない（混入防止）
    if(fld.showIf){for(var k in fld.showIf)if(cur[k]!==fld.showIf[k])return;}
    if(fld.type==='note'){if(cur.note)e.note=String(cur.note).slice(0,200);return;}
    if(fld.type==='number'){var n=parseInt(cur[fld.key],10);if(!isNaN(n)&&n>0)e[fld.key]=n;return;}
    if(cur[fld.key])e[fld.key]=cur[fld.key];
  });
  LOG.push(e);
  cur={ev:'',g:'',note:''};
  save();render();
}

function doReset(){
  CC={};LOG=[];cur={ev:'',g:'',note:''};
  try{localStorage.removeItem(SK+'c');localStorage.removeItem(SK+'l');}catch(e){}
  render();
}

document.addEventListener('click',function(ev){
  var t=ev.target.closest('[data-tab],[data-ev],[data-seg],[data-a],[data-cm],[data-cp],[data-del]');
  if(!t)return;
  if(t.dataset.tab){curTab=t.dataset.tab;render();return;}
  if(t.dataset.ev!=null){
    var nv=t.dataset.ev;
    if(cur.ev===nv)cur=blankCur();
    else { var keepG=cur.g; cur=blankCur(); cur.ev=nv; cur.g=keepG; }
    render();return;
  }
  if(t.dataset.seg){var g=t.dataset.seg,v=t.dataset.val;cur[g]=(cur[g]===v?'':v);render();return;}
  if(t.dataset.cm){inc(t.dataset.cm,-1);return;}
  if(t.dataset.cp){inc(t.dataset.cp,1);return;}
  if(t.dataset.del!=null){var i=parseInt(t.dataset.del,10);if(!isNaN(i)){LOG.splice(i,1);save();render();}return;}
  if(t.dataset.a==='evchange'){var keepG2=cur.g;cur=blankCur();cur.g=keepG2;render();return;}
  if(t.dataset.a==='add'){addEntry();return;}
  if(t.dataset.a==='copy'){
    var ta=$('#expTa');if(ta){ta.select();try{document.execCommand('copy');}catch(e){}if(navigator.clipboard){try{navigator.clipboard.writeText(ta.value);}catch(e){}}t.textContent='✅ コピー完了';setTimeout(function(){t.textContent='📋 コピー';},1500);}
    return;
  }
  if(t.dataset.a==='reset'){$('#resetModal').style.display='flex';return;}
  if(t.dataset.a==='reset-cancel'){$('#resetModal').style.display='none';return;}
  if(t.dataset.a==='reset-confirm'){$('#resetModal').style.display='none';doReset();return;}
});
document.addEventListener('input',function(ev){
  var t=ev.target;
  if(t.id==='iG')cur.g=t.value;
  else if(t.id==='iNote')cur.note=t.value;
  else if(t.dataset&&t.dataset.num)cur[t.dataset.num]=t.value;
});
$('#resetModal').addEventListener('click',function(ev){if(ev.target===this)this.style.display='none';});

/* 起動 */
cur={ev:'',g:'',note:''};
applyTheme();
load();
render();
</script>
</body>
</html>
